<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acil Triyaj Arcade - V3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #333;
            border-radius: 12px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas { display: block; }

        .ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 12px 25px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #2c3e50;
            border-bottom: 3px solid #34495e;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .difficulty-buttons .btn {
            margin: 0 5px;
            opacity: 0.5;
            transition: 0.2s;
            font-weight: bold;
        }

        .difficulty-buttons .active {
            opacity: 1;
            border: 2px solid white;
            transform: scale(1.1);
        }

        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-top">
            <div>SÜRE: <span id="timer" style="color: #3498db;">0</span></div>
            <div>PUAN: <span id="score" style="color: #f1c40f;">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div id="game-over-overlay">
            <h1 class="text-danger mb-2">OYUN BİTTİ</h1>
            <p id="final-result" class="fs-4 mb-4"></p>
            <button class="btn btn-lg btn-primary px-5" onclick="resetGame()">Yeniden Başla</button>
        </div>
    </div>

    <div class="controls">
        <div class="difficulty-buttons">
            <button id="btn-easy" class="btn btn-success active" onclick="setDifficulty('easy')">KOLAY</button>
            <button id="btn-medium" class="btn btn-warning" onclick="setDifficulty('medium')">ORTA</button>
            <button id="btn-hard" class="btn btn-danger" onclick="setDifficulty('hard')">ZOR</button>
        </div>

        <div class="main-buttons">
            <button id="startBtn" class="btn btn-success btn-lg px-4" onclick="startGame()">BAŞLA</button>
            <button id="endBtn" class="btn btn-danger btn-lg px-4" onclick="endGame()">BİTİR</button>
            <button class="btn btn-secondary btn-lg px-4" onclick="resetGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false;
        let animationId, timerInterval, patients = [];
        let difficulty = 'easy';

        const difficultySettings = {
            easy: { blackChance: 0.003 },
            medium: { blackChance: 0.012 },
            hard: { blackChance: 0.035 }
        };

        const paddle = {
            width: 130, height: 20,
            x: 235, y: 460,
            speed: 10, dx: 0
        };

        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.2, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.8, points: 10 },
            RED: { color: '#FF0000', speed: 5.8, points: 20 },
            BLACK: { color: '#444444', speed: 4.5, points: -15 }
        };

        function setDifficulty(lvl) {
            if (gameRunning) return;
            difficulty = lvl;
            document.querySelectorAll('.difficulty-buttons .btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lvl).classList.add('active');
        }

        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        function drawStretcher(x, y, w, h) {
            // 1. Tekerlekler
            ctx.fillStyle = "#555";
            ctx.beginPath();
            ctx.arc(x + 25, y + h + 5, 6, 0, Math.PI * 2);
            ctx.arc(x + w - 25, y + h + 5, 6, 0, Math.PI * 2);
            ctx.fill();

            // 2. Ana Gövde (Sedye şiltesi) - Eski beğenilen tasarım
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            // Gövde
            ctx.roundRect(x + 30, y, w - 30, h, 5);
            // Baş kısmı (eğimli)
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 35, y);
            ctx.lineTo(x + 35, y + h);
            ctx.lineTo(x + 5, y + h);
            ctx.closePath();
            ctx.fill();
            
            // 3. İskelet Detayı
            ctx.strokeStyle = "#95a5a6";
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 30, y + h - 5, w - 30, 3);
        }

        function createPatient() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            const typeKey = keys[Math.floor(Math.random() * keys.length)];
            patients.push({
                x: Math.random() * (canvas.width - 50) + 10,
                y: -60, width: 45, height: 45,
                type: { ...patientTypes[typeKey] },
                isBlack: false,
                activeZone: canvas.height * 0.45
            });
            setTimeout(createPatient, Math.max(300, 1000 - (time * 2)));
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawStretcher(paddle.x, paddle.y, paddle.width, paddle.height);

            patients.forEach((p, i) => {
                // Siyah dönüşüm mantığı
                if (!p.isBlack && p.y > p.activeZone) {
                    if (Math.random() < difficultySettings[difficulty].blackChance) {
                        p.isBlack = true;
                        p.type = { ...patientTypes.BLACK };
                    }
                }

                // İkon Çizimi - NET RENKLER
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "45px serif";
                ctx.fillStyle = p.type.color;
                
                // Shadow kapatıldı (Grileşmeyi önlemek için)
                ctx.shadowBlur = 0; 
                
                ctx.fillText("👤", p.x + p.width/2, p.y + p.height/2);

                if(p.isBlack) {
                    ctx.fillStyle = "#FF0000"; // Siyah hasta üzerinde net kırmızı X
                    ctx.font = "bold 24px Arial";
                    ctx.fillText("✘", p.x + p.width/2, p.y - 12);
                }

                p.y += p.type.speed;

                // Yakalama
                if (p.y + p.height > paddle.y && p.x + p.width > paddle.x && p.x < paddle.x + paddle.width && p.y < paddle.y + paddle.height) {
                    score += p.type.points;
                    scoreEl.innerText = score;
                    patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });

            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            animationId = requestAnimationFrame(draw);
        }

        function startGame() {
            if (gameRunning) return;
            score = 0; time = 0; patients = [];
            scoreEl.innerText = "0"; timerEl.innerText = "0";
            overlay.style.display = 'none';
            gameRunning = true;
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            createPatient();
            draw();
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `Puan: ${score} | Süre: ${time} sn`;
            overlay.style.display = 'flex';
        }

        function resetGame() {
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            gameRunning = false;
            startGame();
        }
    </script>
</body>
</html>
