<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acil Triyaj Arcade - Profesyonel Versiyon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #333;
            border-radius: 10px;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #2c3e50;
            border-bottom: 2px solid #34495e;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .difficulty-buttons .btn {
            margin: 0 5px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .difficulty-buttons .active {
            opacity: 1;
            border: 2px solid white;
            transform: scale(1.1);
        }

        .score-val { color: #ffca28; }
        .timer-val { color: #00e5ff; }
        
        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-top">
            <div>SÜRE: <span id="timer" class="timer-val">0</span></div>
            <div>PUAN: <span id="score" class="score-val">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div id="game-over-overlay">
            <h1 class="text-danger mb-3">OYUN BİTTİ!</h1>
            <p id="final-result" class="fs-4 mb-4"></p>
            <button class="btn btn-lg btn-primary" onclick="resetGame()">Yeniden Başla</button>
        </div>
    </div>

    <div class="controls">
        <div class="difficulty-buttons">
            <span class="me-2">Zorluk:</span>
            <button id="btn-easy" class="btn btn-success active" onclick="setDifficulty('easy')">KOLAY</button>
            <button id="btn-medium" class="btn btn-warning" onclick="setDifficulty('medium')">ORTA</button>
            <button id="btn-hard" class="btn btn-danger" onclick="setDifficulty('hard')">ZOR</button>
        </div>

        <div class="main-buttons">
            <button id="startBtn" class="btn btn-success btn-lg px-5" onclick="startGame()">BAŞLA</button>
            <button id="endBtn" class="btn btn-danger btn-lg" onclick="endGame()">BİTİR</button>
            <button class="btn btn-warning btn-lg" onclick="resetGame()">RESTART</button>
        </div>
    </div>

    <div class="mt-3 text-secondary text-center">
        <small>Hareket: <b>Ok Tuşları</b> veya <b>A-D</b> | <b>Siyah (Ex)</b> kişileri yakalamayın!</small>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0;
        let time = 0;
        let gameRunning = false;
        let animationId;
        let timerInterval;
        let patients = [];
        
        // Zorluk Ayarları
        let difficulty = 'easy';
        const difficultySettings = {
            easy: { blackChance: 0.003, label: 'Kolay' },
            medium: { blackChance: 0.012, label: 'Orta' },
            hard: { blackChance: 0.03, label: 'Zor' }
        };

        const paddle = {
            width: 120,
            height: 15,
            x: canvas.width / 2 - 60,
            y: canvas.height - 30,
            speed: 10,
            dx: 0
        };

        const patientTypes = {
            GREEN: { color: '#4caf50', speed: 2.2, points: 5 },
            YELLOW: { color: '#ffeb3b', speed: 3.8, points: 10 },
            RED: { color: '#f44336', speed: 5.8, points: 20 },
            BLACK: { color: '#333333', speed: 4.5, points: -15 }
        };

        function setDifficulty(lvl) {
            if (gameRunning) return;
            difficulty = lvl;
            document.querySelectorAll('.difficulty-buttons .btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lvl).classList.add('active');
        }

        // Kontroller
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (['arrowleft', 'arrowright', 'a', 'd'].includes(key)) paddle.dx = 0;
        });

        function createPatient() {
            if (!gameRunning) return;
            
            const types = ['GREEN', 'YELLOW', 'RED'];
            const typeKey = types[Math.floor(Math.random() * types.length)];
            
            patients.push({
                x: Math.random() * (canvas.width - 40) + 10,
                y: -50,
                width: 40,
                height: 40,
                type: { ...patientTypes[typeKey] },
                isBlack: false,
                activeZone: canvas.height * 0.4 // Ekranın %40'ından sonra siyah olabilirler
            });

            // Zamanla hızlanan spawn süresi
            const spawnRate = Math.max(300, 1000 - (time * 3));
            setTimeout(createPatient, spawnRate);
        }

        function drawPaddle() {
            ctx.fillStyle = '#f5f5f5';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'white';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawPatients() {
            patients.forEach((p, index) => {
                // Siyah (Ex) Dönüşüm Mantığı
                if (!p.isBlack && p.y > p.activeZone) {
                    if (Math.random() < difficultySettings[difficulty].blackChance) {
                        p.isBlack = true;
                        p.type = { ...patientTypes.BLACK };
                    }
                }

                // İkon Çizimi
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "38px serif";
                
                // Renk ve Parlama
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.isBlack ? "red" : p.type.color;
                ctx.fillStyle = p.isBlack ? "#222" : p.type.color;

                // Person İkonu
                ctx.fillText("👤", p.x + p.width/2, p.y + p.height/2);

                // Siyah hasta uyarısı (X işareti)
                if(p.isBlack) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "red";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText("✘", p.x + p.width/2, p.y - 10);
                }

                ctx.shadowBlur = 0;
                p.y += p.type.speed;

                // Çarpışma Kontrolü
                if (
                    p.y + p.height > paddle.y &&
                    p.x + p.width > paddle.x &&
                    p.x < paddle.x + paddle.width &&
                    p.y < paddle.y + paddle.height
                ) {
                    score += p.type.points;
                    scoreEl.innerText = score;
                    patients.splice(index, 1);
                }

                if (p.y > canvas.height) {
                    patients.splice(index, 1);
                }
            });
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            drawPaddle();
            drawPatients();

            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            overlay.style.display = 'none';
            patients = [];
            score = 0;
            time = 0;
            scoreEl.innerText = score;
            timerEl.innerText = time;
            
            timerInterval = setInterval(() => {
                time++;
                timerEl.innerText = time;
            }, 1000);

            createPatient();
            update();
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            finalResultEl.innerHTML = `Zorluk: <b>${difficultySettings[difficulty].label}</b><br>Toplam Puan: <b>${score}</b><br>Süre: <b>${time} sn</b>`;
            overlay.style.display = 'flex';
        }

        function resetGame() {
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            gameRunning = false;
            startGame();
        }
    </script>
</body>
</html>
