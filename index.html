<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade - Final Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --sf-yellow: #ffcc00; --sf-orange: #ff4500; --neon-pink: #ff00ff; }
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
            url('https://acil42.com/wp-content/uploads/2026/05/Gemini_Generated_Image_6l5nw56l5nw56l5n.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; padding: 20px 0; font-family: 'Press Start 2P', cursive;
            overflow-x: hidden; touch-action: none; 
        }
        .game-title { font-size: 18px; font-style: italic; color: var(--sf-yellow); text-shadow: 3px 3px 0px var(--sf-orange); margin-bottom: 15px; text-align: center; }
        .accordion-wrapper { width: 95vw; max-width: 500px; margin-bottom: 10px; border: 2px solid #444; background: #222; }
        .accordion-header { width: 100%; background: #333; color: var(--sf-yellow); padding: 10px; font-size: 9px; border: none; cursor: pointer; font-family: 'Press Start 2P', cursive; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #111; font-size: 8px; }
        .accordion-content.open { max-height: 400px; padding: 15px; border-top: 1px solid #444; }
        #game-container { position: relative; border: 4px solid var(--sf-yellow); background-color: rgba(0, 0, 0, 0.9); width: 95vw; max-width: 500px; touch-action: none; }
        canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; touch-action: none; }
        .ui-top { display: flex; justify-content: space-between; padding: 10px; font-size: 8px; background: #222; border-bottom: 2px solid var(--sf-yellow); }
        .pixel-btn { font-family: 'Press Start 2P', cursive; font-size: 8px; border: 2px solid #000; box-shadow: 2px 2px 0px #555; padding: 8px 10px; cursor: pointer; background: #eee; color: #000; }
        .active-diff { border-color: white !important; background: #333; color: white; transform: scale(1.1); }
        .bottom-controls { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; width: 95vw; max-width: 500px; justify-content: center; }
        #game-over-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .hs-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #00e5ff; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <h1 class="game-title">ACİL TRİYAJ<br>ARCADE</h1>

    <div class="accordion-wrapper">
        <button class="accordion-header" onclick="toggleAcc('howToPlay')">NASIL OYNANIR? ▼</button>
        <div id="howToPlay" class="accordion-content">
            • Hastaları yakala! Yeşil, Sarı, Kırmızı puan verir.<br><br>
            • <span style="color:var(--neon-pink)">ASCOM (X):</span> 3 tane yakalarsan OYUN BİTER!<br><br>
            • Her 60 saniyede hız %10 artar!
        </div>
    </div>

    <!-- Müzik ve Ses Butonları (1. Madde Geri Geldi) -->
    <div class="d-flex gap-2 mb-2">
        <button id="sfxToggle" class="pixel-btn" onclick="toggleSFX()">EFEKT: AÇIK</button>
        <button id="musicToggle" class="pixel-btn" onclick="toggleMusic()">MÜZİK: AÇIK</button>
    </div>

    <div class="mb-3 d-flex gap-2">
        <button id="btn-easy" class="pixel-btn active-diff" onclick="setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="pixel-btn" onclick="setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="pixel-btn" onclick="setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div style="color: #00e5ff;">SÜRE:<span id="timer">0</span></div>
            <div style="color: var(--neon-pink);">ASCOM:<span id="ascom-count">0</span>/3</div>
            <div style="color: var(--sf-yellow);">PUAN:<span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-overlay">
            <div class="game-title" id="over-title">OYUN BİTTİ</div>
            <div id="final-result" class="mb-4" style="font-size: 10px; line-height: 2; text-align: center;"></div>
            <button class="pixel-btn w-75 mb-2" onclick="resetGame()">TEKRAR DENE</button>
            <button class="pixel-btn w-75" style="color:white; background: linear-gradient(to bottom, #ffcc00, #ff4500);" onclick="generateAndShare()">PAYLAŞ 📱</button>
        </div>
    </div>

    <div class="bottom-controls">
        <button id="startBtn" class="pixel-btn" style="background:#28a745; color:white;" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="pixel-btn" style="background:#dc3545; color:white;" onclick="endGame()">BİTİR</button>
        <button class="pixel-btn" onclick="resetGame()">RESTART</button>
    </div>

    <!-- Top 5 Skor Bölümü (2. Madde Geri Geldi) -->
    <div class="accordion-wrapper" style="margin-top:15px;">
        <button class="accordion-header" onclick="toggleAcc('highScores')">TOP 5 SKORLAR ▼</button>
        <div id="highScores" class="accordion-content">
            <div id="hsList">Henüz skor kaydedilmedi.</div>
        </div>
    </div>

    <div class="footer-credit" style="font-size:7px; color:#aaa; margin-top:20px;">Uzm.Dr.Yasin Yıldız (c) 2026</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const ascomEl = document.getElementById('ascom-count');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, ascomCount = 0, gameRunning = false, sfxEnabled = true, musicEnabled = true;
        let patients = [], animationId, timerInterval, musicInterval;
        let difficulty = 'easy';
        let speedMultiplier = 1.0;
        let paddle = { width: 85, height: 16, x: 0, y: 0, speed: 18, dx: 0 };

        const difficultySettings = { 
            easy: { blackChance: 0.002, ascomChance: 0.0005, tr: 'KOLAY' }, 
            medium: { blackChance: 0.01, ascomChance: 0.002, tr: 'ORTA' }, 
            hard: { blackChance: 0.025, ascomChance: 0.005, tr: 'ZOR' } 
        };

        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.3, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.8, points: 10 },
            RED: { color: '#FF0000', speed: 5.8, points: 20 },
            BLACK: { color: '#333333', speed: 4.8, points: -15 },
            ASCOM: { color: '#ff00ff', speed: 6.5, points: 0 }
        };

        // --- SES VE MÜZİK SİSTEMİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSnd(f, t, d, v) {
            if ((!sfxEnabled && t !== 'triangle') || (!musicEnabled && t === 'triangle')) return;
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            const melody = [261, 329, 392, 523, 392, 329]; let step = 0;
            musicInterval = setInterval(() => {
                if (gameRunning && musicEnabled) {
                    playSnd(melody[step % melody.length], 'triangle', 0.4, 0.03);
                    step++;
                }
            }, 250);
        }

        function toggleSFX() { sfxEnabled = !sfxEnabled; document.getElementById('sfxToggle').innerText = `EFEKT: ${sfxEnabled ? 'AÇIK' : 'KAPALI'}`; }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('musicToggle').innerText = `MÜZİK: ${musicEnabled ? 'AÇIK' : 'KAPALI'}`; }
        function toggleAcc(id) { document.getElementById(id).classList.toggle('open'); }

        // --- OYUN ALANI ---
        function resizeCanvas() {
            canvas.width = document.getElementById('game-container').clientWidth;
            canvas.height = window.innerHeight * 0.45;
            paddle.y = canvas.height - 70; paddle.x = (canvas.width / 2) - 42;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        // Dokunmatik Fix
        function handleTouch(e) {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            paddle.x = (touch.clientX - rect.left) * scaleX - (paddle.width / 2);
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
        }
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });

        function update() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FFF"; ctx.fillRect(paddle.x + 20, paddle.y + 4, paddle.width - 20, 8);
            ctx.fillRect(paddle.x + 4, paddle.y, 16, 4);
            ctx.fillStyle = "#AAA"; ctx.fillRect(paddle.x + 20, paddle.y + 12, paddle.width - 20, 2);

            patients.forEach((p, i) => {
                if (!p.isAscom && !p.isBlack && p.y > canvas.height * 0.45) {
                    let roll = Math.random();
                    if (roll < difficultySettings[difficulty].ascomChance) { p.isAscom = true; p.type = patientTypes.ASCOM; }
                    else if (roll < difficultySettings[difficulty].blackChance) { p.isBlack = true; p.type = patientTypes.BLACK; }
                }

                if (p.isAscom) {
                    ctx.fillStyle = "#ff00ff"; ctx.font = "bold 30px Arial"; ctx.textAlign = "center"; ctx.fillText("X", p.x + 15, p.y + 30);
                } else {
                    ctx.fillStyle = p.type.color; ctx.fillRect(p.x + 8, p.y, 12, 12); ctx.fillRect(p.x, p.y + 12, 28, 24);
                    if(p.isBlack) { ctx.fillStyle = "#FFF"; ctx.font = "14px Arial"; ctx.fillText("X", p.x + 8, p.y + 30); }
                }

                p.y += p.type.speed * speedMultiplier;

                if (p.y + 30 > paddle.y && p.x + 25 > paddle.x && p.x < paddle.x + paddle.width) {
                    if (p.isAscom) {
                        ascomCount++; ascomEl.innerText = ascomCount;
                        playSnd(1200, 'sawtooth', 0.5, 0.2);
                        if (ascomCount >= 3) { endGame("ASCOM BUM!"); return; }
                    } else {
                        playSnd(p.isBlack ? 150 : 600, 'square', 0.1, 0.1);
                        score += p.type.points; scoreEl.innerText = score;
                    }
                    patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            if (gameRunning) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            gameRunning = true; score = 0; time = 0; ascomCount = 0; speedMultiplier = 1.0; patients = [];
            scoreEl.innerText = "0"; timerEl.innerText = "0"; ascomEl.innerText = "0";
            overlay.style.display = 'none';
            timerInterval = setInterval(() => { 
                time++; timerEl.innerText = time;
                if (time % 60 === 0) speedMultiplier += 0.1;
            }, 1000);
            startMusic();
            const spawn = () => { if (gameRunning) { 
                const keys = ['GREEN', 'YELLOW', 'RED'];
                patients.push({ x: Math.random() * (canvas.width - 30), y: -50, type: patientTypes[keys[Math.floor(Math.random()*3)]], isBlack: false, isAscom: false });
                setTimeout(spawn, 1000);
            }};
            spawn(); update();
        }

        function endGame(reason = "OYUN BİTTİ") {
            if (!gameRunning) return; gameRunning = false;
            clearInterval(timerInterval); clearInterval(musicInterval); cancelAnimationFrame(animationId);
            document.getElementById('over-title').innerText = reason;
            finalResultEl.innerHTML = `PUAN: ${score}<br>SÜRE: ${time}sn<br>MOD: ${difficultySettings[difficulty].tr}`;
            overlay.style.display = 'flex';
            saveScore();
        }

        // --- SKOR VE PAYLAŞIM (3. Madde Geri Geldi) ---
        function saveScore() {
            let hs = JSON.parse(localStorage.getItem('triyaj_top5') || '[]');
            if (score > 0) {
                hs.push({score, diff: difficultySettings[difficulty].tr, time});
                hs.sort((a,b)=>b.score-a.score);
                hs = hs.slice(0,5);
                localStorage.setItem('triyaj_top5', JSON.stringify(hs));
            }
            renderHS();
        }

        function renderHS() {
            const hs = JSON.parse(localStorage.getItem('triyaj_top5') || '[]');
            document.getElementById('hsList').innerHTML = hs.map((s,i)=>`
                <div class="hs-row">
                    <span>${i+1}. ${s.diff} (${s.time}s)</span>
                    <span>${s.score} P</span>
                </div>
            `).join('') || 'Henüz skor yok.';
        }

        function generateAndShare() {
            const tC = document.createElement('canvas'); const t = tC.getContext('2d'); tC.width = 500; tC.height = 550;
            t.fillStyle = '#1a1a1a'; t.fillRect(0, 0, 500, 550);
            t.save(); t.translate(250, 80); t.rotate(-0.05);
            t.font = 'bold 34px Arial'; t.textAlign = 'center'; t.fillStyle = '#ff4500'; t.fillText('ACİL TRİYAJ ARCADE', 4, 4);
            t.fillStyle = '#ffcc00'; t.fillText('ACİL TRİYAJ ARCADE', 0, 0); t.restore();
            t.fillStyle = '#ffcc00'; t.font = 'bold 100px Arial'; t.textAlign = 'center'; t.fillText(score, 250, 250);
            // Skor kartına süre ve mod bilgisi eklendi (3. Madde Fix)
            t.fillStyle = '#ffffff'; t.font = '22px Arial'; t.fillText(`${time} SN - ${difficultySettings[difficulty].tr.toUpperCase()}`, 250, 320);
            t.fillStyle = '#777'; t.font = '12px Arial'; t.fillText('Uzm.Dr.Yasin Yıldız (c) 2026', 250, 510);
            tC.toBlob(blob => {
                const f = new File([blob], 'triyaj.png', {type: 'image/png'});
                if (navigator.share) navigator.share({title: 'Triyaj Arcade', text: `Skorum: ${score}`, files: [f]});
            });
        }

        function resetGame() { endGame(); setTimeout(startGame, 100); }
        function setDifficulty(lvl) { 
            if (gameRunning) return; difficulty = lvl;
            document.querySelectorAll('.mb-3 .pixel-btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById('btn-' + lvl).classList.add('active-diff');
        }

        renderHS();
    </script>
</body>
</html>
