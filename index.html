<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #1a1a1a;
            /* Retro Acil Servis Atmosferi (Pixel Art Esintili) */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://img.freepik.com/free-vector/hospital-hallway-concept-illustration_114360-14169.jpg'); /* Temsili soft görsel */
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Street Fighter Tarzı Başlık */
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 22px;
            text-transform: uppercase;
            font-style: italic;
            color: #ffcc00;
            text-shadow: 
                3px 3px 0px #ff4500, 
                6px 6px 0px #000;
            margin-bottom: 15px;
            transform: skew(-10deg);
            letter-spacing: -1px;
            text-align: center;
        }

        #game-container {
            position: relative;
            border: 4px solid #ffcc00;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.85); /* Oyun alanı daha net */
            width: 95vw;
            max-width: 500px;
            box-shadow: 0 0 20px #ff4500;
        }

        canvas { display: block; width: 100%; height: auto; }

        .ui-top {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            background: #222;
        }

        .bottom-controls { 
            margin-top: 15px; 
            display: flex; 
            gap: 10px;
            width: 95vw;
            max-width: 500px;
        }

        .share-btn { 
            background: linear-gradient(to bottom, #ffcc00, #ff4500);
            border: 2px solid #000;
            color: white; 
            font-weight: bold;
            text-shadow: 1px 1px #000;
            padding: 12px;
            width: 80%;
        }

        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .active-diff { border: 2px solid white !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <h1 class="game-title">ACİL TRİYAJ<br>ARCADE</h1>

    <div class="mb-2">
        <button id="btn-easy" class="btn btn-sm btn-success active-diff" onclick="setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="btn btn-sm btn-warning" style="opacity:0.6" onclick="setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="btn btn-sm btn-danger" style="opacity:0.6" onclick="setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div style="color: #00e5ff;">SÜRE:<span id="timer">0</span></div>
            <div style="color: #ffcc00;">PUAN:<span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="game-over-overlay">
            <div class="game-title" style="font-size: 18px;">OYUN BİTTİ</div>
            <div id="final-result" class="fs-4 mb-3" style="font-family: 'Press Start 2P'; font-size: 12px;"></div>
            <button class="btn btn-primary btn-lg mb-2 w-75" onclick="resetGame()">TEKRAR OYNA</button>
            <button class="share-btn" onclick="generateAndShare()">SONUCU PAYLAŞ 📱</button>
        </div>
    </div>

    <div class="bottom-controls">
        <button id="startBtn" class="btn btn-success flex-grow-1 fw-bold" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="btn btn-danger flex-grow-1 fw-bold" onclick="endGame()">BİTİR</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false;
        let patients = [];
        let difficulty = 'easy';
        let paddle = { width: 85, height: 16, x: 0, y: 0, speed: 15, dx: 0 };

        const difficultySettings = { easy: { blackChance: 0.002 }, medium: { blackChance: 0.009 }, hard: { blackChance: 0.025 } };
        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.2, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.5, points: 10 },
            RED: { color: '#FF0000', speed: 5.5, points: 20 },
            BLACK: { color: '#444444', speed: 4.5, points: -15 }
        };

        function resizeCanvas() {
            const containerW = document.getElementById('game-container').clientWidth;
            canvas.width = containerW;
            canvas.height = window.innerHeight * 0.5; 
            paddle.y = canvas.height - 80;
            paddle.x = (canvas.width / 2) - (paddle.width / 2);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Klavye
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        // Dokunmatik
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            paddle.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - (paddle.width / 2);
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }, { passive: false });

        function setDifficulty(lvl) {
            if (gameRunning) return;
            difficulty = lvl;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById('btn-' + lvl).classList.add('active-diff');
        }

        function drawStretcher(x, y, w, h) {
            ctx.fillStyle = "#FFFFFF"; ctx.beginPath(); ctx.roundRect(x + 18, y, w - 18, h, 4);
            ctx.moveTo(x, y - 10); ctx.lineTo(x + 22, y); ctx.lineTo(x + 22, y + h); ctx.lineTo(x + 5, y + h);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#555"; ctx.beginPath(); ctx.arc(x + 18, y + h + 4, 5, 0, Math.PI * 2); ctx.arc(x + w - 10, y + h + 4, 5, 0, Math.PI * 2); ctx.fill();
        }

        function drawPerson(x, y, color, isEx) {
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x + 12, y + 6, 7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(x + 5, y + 14, 14, 18, 4); ctx.fill();
            if(isEx) { ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center"; ctx.fillText("X", x + 12, y + 27); }
        }

        function update() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStretcher(paddle.x, paddle.y, paddle.width, paddle.height);
            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0; if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            patients.forEach((p, i) => {
                if (!p.isBlack && p.y > canvas.height * 0.4 && Math.random() < difficultySettings[difficulty].blackChance) {
                    p.isBlack = true; p.type = { ...patientTypes.BLACK };
                }
                drawPerson(p.x, p.y, p.type.color, p.isBlack);
                p.y += p.type.speed;
                if (p.y + 35 > paddle.y && p.x + 25 > paddle.x && p.x < paddle.x + paddle.width) {
                    score += p.type.points; scoreEl.innerText = score; patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            requestAnimationFrame(update);
        }

        function startGame() {
            if (gameRunning) return;
            score = 0; time = 0; patients = [];
            overlay.style.display = 'none'; gameRunning = true;
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            spawn(); update();
        }

        function spawn() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            patients.push({ x: Math.random() * (canvas.width - 30), y: -50, type: { ...patientTypes[keys[Math.floor(Math.random() * 3)]] }, isBlack: false });
            setTimeout(spawn, 1000);
        }

        function endGame() {
            gameRunning = false; clearInterval(timerInterval);
            finalResultEl.innerHTML = `SCORE: ${score}<br>TIME: ${time}s`;
            overlay.style.display = 'flex';
        }

        function resetGame() { endGame(); startGame(); }

        // --- SKOR KARTI TASARIMI (Street Fighter Style) ---
        function generateAndShare() {
            const tC = document.createElement('canvas'); const t = tC.getContext('2d');
            tC.width = 500; tC.height = 500;
            t.fillStyle = '#1a1a1a'; t.fillRect(0, 0, 500, 500);
            
            // SF Style Header in Image
            t.save();
            t.translate(250, 80); t.rotate(-0.1);
            t.font = 'bold 45px Arial Black'; t.textAlign = 'center';
            t.fillStyle = '#ff4500'; t.fillText('ACİL TRİYAJ', 4, 4);
            t.fillStyle = '#ffcc00'; t.fillText('ACİL TRİYAJ', 0, 0);
            t.restore();

            t.fillStyle = '#ffffff'; t.font = '30px Courier New'; t.fillText('ARCADE RESULTS', 250, 160);
            t.fillStyle = '#ffcc00'; t.font = 'bold 90px Arial'; t.fillText(score, 250, 300);
            t.font = '25px Arial'; t.fillText('POINTS', 250, 340);
            t.fillStyle = '#3498db'; t.fillText(`${time} SECONDS - ${difficulty.toUpperCase()}`, 250, 420);

            tC.toBlob(blob => {
                const f = new File([blob], 'result.png', {type: 'image/png'});
                if (navigator.share) navigator.share({title: 'Triyaj Arcade', text: `Puanım: ${score}`, files: [f]});
                else { const a = document.createElement('a'); a.download = 'score.png'; a.href = tC.toDataURL(); a.click(); }
            });
        }
    </script>
</body>
</html>
