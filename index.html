<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acil Triyaj Arcade v1.7 - Net Görünüm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #444;
            border-radius: 8px;
            background-color: #000;
        }

        canvas { display: block; }

        .ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            font-size: 1.4rem;
            font-weight: bold;
            background: #333;
            border-bottom: 2px solid #555;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .difficulty-buttons .btn {
            margin: 0 5px;
            opacity: 0.6;
            font-weight: bold;
        }

        .difficulty-buttons .active {
            opacity: 1;
            border: 2px solid white;
            transform: scale(1.05);
        }

        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-top">
            <div>SÜRE: <span id="timer" style="color: #00e5ff;">0</span></div>
            <div>PUAN: <span id="score" style="color: #ffca28;">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div id="game-over-overlay">
            <h1 class="text-danger mb-2">OYUN BİTTİ</h1>
            <p id="final-result" class="fs-4 mb-4"></p>
            <button class="btn btn-lg btn-primary px-5" onclick="resetGame()">Yeniden Başla</button>
        </div>
    </div>

    <div class="controls">
        <div class="difficulty-buttons">
            <button id="btn-easy" class="btn btn-success active" onclick="setDifficulty('easy')">KOLAY</button>
            <button id="btn-medium" class="btn btn-warning" onclick="setDifficulty('medium')">ORTA</button>
            <button id="btn-hard" class="btn btn-danger" onclick="setDifficulty('hard')">ZOR</button>
        </div>

        <div class="main-buttons">
            <button id="startBtn" class="btn btn-success btn-lg px-4" onclick="startGame()">BAŞLA</button>
            <button id="endBtn" class="btn btn-danger btn-lg px-4" onclick="endGame()">BİTİR</button>
            <button class="btn btn-secondary btn-lg px-4" onclick="resetGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false;
        let animationId, timerInterval, patients = [];
        let difficulty = 'easy';

        const difficultySettings = {
            easy: { blackChance: 0.002 },
            medium: { blackChance: 0.01 },
            hard: { blackChance: 0.03 }
        };

        const paddle = {
            width: 120, height: 40, // Yüksekliği baş kısmı için artırdık
            x: 240, y: 440,
            speed: 10, dx: 0
        };

        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.5, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 4, points: 10 },
            RED: { color: '#FF0000', speed: 6, points: 20 },
            BLACK: { color: '#555555', speed: 4.5, points: -15 }
        };

        function setDifficulty(lvl) {
            if (gameRunning) return;
            difficulty = lvl;
            document.querySelectorAll('.difficulty-buttons .btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lvl).classList.add('active');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') paddle.dx = -paddle.speed;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        function drawStretcher(x, y, w, h) {
            // Tekerlekler
            ctx.fillStyle = "#777";
            ctx.beginPath();
            ctx.arc(x + 35, y + 35, 6, 0, Math.PI * 2);
            ctx.arc(x + w - 20, y + 35, 6, 0, Math.PI * 2);
            ctx.fill();

            // Sedye İskeleti (Koyu Gri)
            ctx.strokeStyle = "#999";
            ctx.lineWidth = 3;
            ctx.strokeRect(x + 20, y + 25, w - 30, 5);

            // Sedye Üst Kısmı (Yatak/Şilte)
            ctx.fillStyle = "#FFFFFF";
            
            // Ana Yatak
            ctx.fillRect(x + 30, y + 15, w - 40, 10);
            
            // Baş Kısmı (Kalkık Duruş - Çapraz dikdörtgen)
            ctx.save();
            ctx.translate(x + 30, y + 15);
            ctx.rotate(-Math.PI / 4); // 45 derece yukarı kaldır
            ctx.fillRect(-25, 0, 35, 10);
            ctx.restore();
        }

        function createPatient() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            const typeKey = keys[Math.floor(Math.random() * keys.length)];
            patients.push({
                x: Math.random() * (canvas.width - 40) + 10,
                y: -50, width: 40, height: 40,
                type: { ...patientTypes[typeKey] },
                isBlack: false,
                changeZone: canvas.height * 0.5
            });
            setTimeout(createPatient, Math.max(350, 1100 - (time * 2)));
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawStretcher(paddle.x, paddle.y, paddle.width, paddle.height);

            patients.forEach((p, i) => {
                // Siyah dönüşüm (Glowsuz, Net renk değişimi)
                if (!p.isBlack && p.y > p.changeZone) {
                    if (Math.random() < difficultySettings[difficulty].blackChance) {
                        p.isBlack = true;
                        p.type = { ...patientTypes.BLACK };
                    }
                }

                // İkon Çizimi (Glow kapatıldı)
                ctx.shadowBlur = 0; 
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "42px serif";
                ctx.fillStyle = p.type.color;
                
                ctx.fillText("👤", p.x + p.width/2, p.y + p.height/2);

                if(p.isBlack) {
                    ctx.fillStyle = "white";
                    ctx.font = "bold 24px Arial";
                    ctx.fillText("✘", p.x + p.width/2, p.y - 15);
                }

                p.y += p.type.speed;

                // Yakalama (Sadece sedyenin üst yüzeyiyle temas)
                if (p.y + p.height > paddle.y && p.x + p.width > paddle.x && p.x < paddle.x + paddle.width && p.y < paddle.y + 25) {
                    score += p.type.points;
                    scoreEl.innerText = score;
                    patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });

            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            animationId = requestAnimationFrame(draw);
        }

        function startGame() {
            if (gameRunning) return;
            score = 0; time = 0; patients = [];
            scoreEl.innerText = "0"; timerEl.innerText = "0";
            overlay.style.display = 'none';
            gameRunning = true;
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            createPatient();
            draw();
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `Puan: ${score}<br>Süre: ${time} sn`;
            overlay.style.display = 'flex';
        }

        function resetGame() {
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            gameRunning = false;
            startGame();
        }
    </script>
</body>
</html>
