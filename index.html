<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade - Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Üst Kontroller */
        .top-difficulty {
            margin-bottom: 10px;
            display: flex;
            gap: 5px;
        }

        #game-container {
            position: relative;
            border: 3px solid #333;
            border-radius: 8px;
            background-color: #000;
            width: 95vw;
            max-width: 500px;
        }

        canvas { display: block; width: 100%; height: auto; }

        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 15px;
            font-size: 1.1rem;
            background: #2c3e50;
        }

        /* Alt Butonlar - PC'de Yayılmaması İçin */
        .bottom-controls { 
            margin-top: 15px; 
            display: flex; 
            gap: 10px;
            width: 95vw;
            max-width: 500px; /* PC'de yayılmayı önleyen kritik ayar */
            justify-content: center;
        }

        .btn-custom { flex: 1; font-weight: bold; }

        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        .share-btn { 
            background-color: #25D366; border: none; color: white; 
            padding: 12px; border-radius: 8px; font-weight: bold; 
            margin-top: 10px; width: 80%;
        }

        .active-diff { border: 2px solid white !important; opacity: 1 !important; transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- Zorluk Seçimi Üstte -->
    <div class="top-difficulty">
        <button id="btn-easy" class="btn btn-sm btn-success active-diff" onclick="setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="btn btn-sm btn-warning" style="opacity:0.6" onclick="setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="btn btn-sm btn-danger" style="opacity:0.6" onclick="setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div>SÜRE: <span id="timer" style="color: #3498db;">0</span></div>
            <div>PUAN: <span id="score" style="color: #f1c40f;">0</span></div>
            <button id="muteToggle" class="btn btn-sm btn-outline-light" onclick="toggleMute()">🔊</button>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="game-over-overlay">
            <h2 class="text-danger">OYUN BİTTİ</h2>
            <div id="final-result" class="fs-4 mb-4"></div>
            <button class="btn btn-primary btn-lg mb-2 w-75" onclick="resetGame()">TEKRAR OYNA</button>
            <button class="share-btn" onclick="generateAndShare()">SONUCU RESİM OLARAK PAYLAŞ 📱</button>
        </div>
    </div>

    <!-- Alt Butonlar -->
    <div class="bottom-controls">
        <button id="startBtn" class="btn btn-success btn-custom" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="btn btn-danger btn-custom" onclick="endGame()">BİTİR</button>
        <button class="btn btn-secondary btn-custom" onclick="resetGame()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false, isMuted = false;
        let animationId, timerInterval, patients = [];
        let difficulty = 'easy';

        // Ses Sistemi
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function toggleMute() { isMuted = !isMuted; document.getElementById('muteToggle').innerText = isMuted ? "🔇" : "🔊"; }
        function playSound(freq, type, duration, vol) {
            if (isMuted) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const difficultySettings = { easy: { blackChance: 0.002 }, medium: { blackChance: 0.009 }, hard: { blackChance: 0.025 } };
        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.2, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.5, points: 10 },
            RED: { color: '#FF0000', speed: 5.5, points: 20 },
            BLACK: { color: '#333333', speed: 4.5, points: -15 }
        };

        let paddle = { width: 85, height: 16, x: 0, y: 0, speed: 15, dx: 0 };

        function resizeCanvas() {
            const containerW = document.getElementById('game-container').clientWidth;
            canvas.width = containerW;
            canvas.height = window.innerHeight * 0.55; 
            paddle.y = canvas.height - 100;
            paddle.x = (canvas.width / 2) - (paddle.width / 2);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // PC Klavye Kontrolü (Geri Getirildi)
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        // Mobil Dokunmatik Kontrol
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            paddle.x = touchX - (paddle.width / 2);
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }, { passive: false });

        function setDifficulty(lvl) {
            if (gameRunning) return;
            difficulty = lvl;
            document.querySelectorAll('.top-difficulty .btn').forEach(b => {
                b.classList.remove('active-diff');
                b.style.opacity = "0.6";
            });
            document.getElementById('btn-' + lvl).classList.add('active-diff');
            document.getElementById('btn-' + lvl).style.opacity = "1";
        }

        function drawStretcher(x, y, w, h) {
            ctx.fillStyle = "#FFFFFF"; ctx.beginPath(); ctx.roundRect(x + 18, y, w - 18, h, 4);
            ctx.moveTo(x, y - 10); ctx.lineTo(x + 22, y); ctx.lineTo(x + 22, y + h); ctx.lineTo(x + 5, y + h);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#555"; ctx.beginPath(); ctx.arc(x + 18, y + h + 4, 5, 0, Math.PI * 2); ctx.arc(x + w - 10, y + h + 4, 5, 0, Math.PI * 2); ctx.fill();
        }

        function drawPerson(x, y, color, isEx) {
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x + 12, y + 6, 7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(x + 5, y + 14, 14, 18, 4); ctx.fill();
            if(isEx) { ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center"; ctx.fillText("X", x + 12, y + 27); }
        }

        function createPatient() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            const typeKey = keys[Math.floor(Math.random() * keys.length)];
            patients.push({
                x: Math.random() * (canvas.width - 40) + 10,
                y: -50, width: 25, height: 35,
                type: { ...patientTypes[typeKey] },
                isBlack: false,
                activeZone: canvas.height * 0.4
            });
            setTimeout(createPatient, Math.max(400, 1150 - (time * 2)));
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStretcher(paddle.x, paddle.y, paddle.width, paddle.height);
            
            // PC Hareketi için DX eklemesi
            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;

            patients.forEach((p, i) => {
                if (!p.isBlack && p.y > p.activeZone) {
                    if (Math.random() < difficultySettings[difficulty].blackChance) { p.isBlack = true; p.type = { ...patientTypes.BLACK }; }
                }
                drawPerson(p.x, p.y, p.type.color, p.isBlack);
                p.y += p.type.speed;
                if (p.y + p.height > paddle.y && p.x + p.width > paddle.x && p.x < paddle.x + paddle.width && p.y < paddle.y + paddle.height) {
                    if (p.isBlack) playSound(100, 'sawtooth', 0.2, 0.1); else playSound(600, 'sine', 0.1, 0.1);
                    score += p.type.points; scoreEl.innerText = score; patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            animationId = requestAnimationFrame(draw);
        }

        function startGame() {
            if (gameRunning) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            score = 0; time = 0; patients = [];
            scoreEl.innerText = "0"; timerEl.innerText = "0";
            overlay.style.display = 'none';
            gameRunning = true;
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            createPatient(); draw();
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false; clearInterval(timerInterval); cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `PUAN: ${score}<br>SÜRE: ${time} SANİYE`;
            overlay.style.display = 'flex';
        }

        function resetGame() {
            cancelAnimationFrame(animationId); clearInterval(timerInterval);
            gameRunning = false; startGame();
        }

        // --- GELİŞMİŞ PAYLAŞIM: SKOR KARTI OLUŞTURMA ---
        function generateAndShare() {
            // Geçici bir canvas oluştur (Skor Kartı için)
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 500;
            tempCanvas.height = 500;

            // Arka Plan (Koyu Triyaj Teması)
            tCtx.fillStyle = '#121212';
            tCtx.fillRect(0, 0, 500, 500);
            tCtx.strokeStyle = '#3498db';
            tCtx.lineWidth = 10;
            tCtx.strokeRect(5, 5, 490, 490);

            // Başlık
            tCtx.fillStyle = '#e74c3c';
            tCtx.font = 'bold 50px Arial';
            tCtx.textAlign = 'center';
            tCtx.fillText('OYUN BİTTİ', 250, 100);

            // Skor Bilgisi
            tCtx.fillStyle = '#ffffff';
            tCtx.font = '30px Arial';
            tCtx.fillText('Triyaj Arcade Sonucu', 250, 180);
            
            tCtx.fillStyle = '#f1c40f';
            tCtx.font = 'bold 80px Arial';
            tCtx.fillText(score, 250, 300);
            tCtx.font = '30px Arial';
            tCtx.fillText('PUAN', 250, 340);

            // Süre ve Zorluk
            tCtx.fillStyle = '#3498db';
            tCtx.font = '25px Arial';
            tCtx.fillText(`Süre: ${time} Saniye`, 250, 420);
            tCtx.fillStyle = '#95a5a6';
            tCtx.fillText(`Zorluk: ${difficulty.toUpperCase()}`, 250, 460);

            // Paylaşım Başlat
            tempCanvas.toBlob(async (blob) => {
                const file = new File([blob], 'triyaj_sonuc.png', { type: 'image/png' });
                const shareData = {
                    title: 'Triyaj Arcade Skorum',
                    text: `Triyaj Arcade oyununda ${score} puan yaptım! Hadi gel beni geç.`,
                    files: [file]
                };

                if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                    await navigator.share(shareData);
                } else {
                    // PC'deysen resmi indir
                    const link = document.createElement('a');
                    link.download = 'triyaj_skorum.png';
                    link.href = tempCanvas.toDataURL();
                    link.click();
                    alert("Paylaşım desteklenmiyor, skor kartın indirildi!");
                }
            });
        }
    </script>
</body>
</html>
