<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade - Klasik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --sf-yellow: #ffcc00; --sf-orange: #ff4500; --dark-gray: #333; }
        
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            overflow-x: hidden;
            touch-action: none;
        }

        .game-title {
            font-size: 18px;
            color: var(--sf-yellow);
            text-shadow: 2px 2px 0px var(--sf-orange);
            margin: 20px 0;
            text-align: center;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--dark-gray);
            background-color: #000;
            width: 95vw;
            max-width: 500px;
        }

        canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }

        /* UI Paneli */
        .ui-top {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 10px;
            border-bottom: 2px solid var(--dark-gray);
        }

        /* Akordiyon Menü Tasarımı */
        .accordion-btn {
            width: 95vw;
            max-width: 500px;
            background: #222;
            color: var(--sf-yellow);
            border: 2px solid var(--dark-gray);
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            margin: 5px 0;
            text-align: center;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #111;
            width: 95vw;
            max-width: 500px;
            font-size: 7px;
            border-left: 2px solid var(--dark-gray);
            border-right: 2px solid var(--dark-gray);
        }

        .accordion-content.open {
            max-height: 200px;
            padding: 10px;
            border-bottom: 2px solid var(--dark-gray);
        }

        /* Butonlar */
        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            border: 2px solid #fff;
            padding: 8px 10px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            margin: 2px;
        }

        .active-diff { background: #444 !important; border-color: var(--sf-yellow) !important; }

        #game-over-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }

        .footer-credit { margin: 20px 0; font-size: 7px; color: #555; text-align: center; }
    </style>
</head>
<body>

    <h1 class="game-title">ACİL TRİYAJ ARCADE</h1>

    <!-- Nasıl Oynanır Akordiyon -->
    <button class="accordion-btn" onclick="toggleAccordion('howToPlay')">NASIL OYNANIR? ▼</button>
    <div id="howToPlay" class="accordion-content">
        • Sağa/Sola hareketle hastaları sedyeye al!<br><br>
        • YEŞİL(+5), SARI(+10), KIRMIZI(+20)<br><br>
        • SİYAH (EX) yakalarsan -15 PUAN!
    </div>

    <div class="d-flex gap-2 my-2">
        <button id="sfxToggle" class="pixel-btn" onclick="btnSound(); toggleSFX()">SES: AÇIK</button>
        <button id="musicToggle" class="pixel-btn" onclick="btnSound(); toggleMusic()">MÜZİK: AÇIK</button>
    </div>

    <div class="mb-2 d-flex gap-2">
        <button id="btn-easy" class="pixel-btn active-diff" onclick="btnSound(); setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="pixel-btn" onclick="btnSound(); setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="pixel-btn" onclick="btnSound(); setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div style="color: #00e5ff;">SÜRE: <span id="timer">0</span></div>
            <div style="color: var(--sf-yellow);">PUAN: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-overlay">
            <div class="game-title">OYUN BİTTİ</div>
            <div id="final-result" class="mb-4" style="font-size: 10px; line-height: 2; text-align: center;"></div>
            <button class="pixel-btn w-75 mb-2" onclick="btnSound(); resetGame()">TEKRAR DENE</button>
            <button class="pixel-btn w-75" onclick="btnSound(); generateAndShare()">PAYLAŞ 📱</button>
        </div>
    </div>

    <div class="bottom-controls my-2 d-flex gap-2">
        <button id="startBtn" class="pixel-btn" style="border-color: #00FF00;" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="pixel-btn" style="border-color: #FF0000;" onclick="btnSound(); endGame()">BİTİR</button>
        <button id="restartBtn" class="pixel-btn" style="border-color: #00e5ff;" onclick="btnSound(); resetGame()">RESTART</button>
    </div>

    <!-- Skorlar Akordiyon -->
    <button class="accordion-btn" onclick="toggleAccordion('highScores')">TOP 3 SKORLAR ▼</button>
    <div id="highScores" class="accordion-content">
        <div id="hsList" style="padding: 5px;">Henüz skor yok.</div>
    </div>

    <div class="footer-credit">
        Geliştirici Uzm.Dr.Yasin Yıldız (c) 2026<br>Tüm hakları saklıdır.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false, sfxEnabled = true, musicEnabled = true;
        let patients = [], animationId, timerInterval, musicInterval;
        let difficulty = 'easy';
        let paddle = { width: 80, height: 16, x: 0, y: 0, speed: 16, dx: 0 };

        const difficultySettings = { easy: { blackChance: 0.002, tr: 'KOLAY' }, medium: { blackChance: 0.01, tr: 'ORTA' }, hard: { blackChance: 0.025, tr: 'ZOR' } };
        const patientTypes = { GREEN: '#00FF00', YELLOW: '#FFFF00', RED: '#FF0000', BLACK: '#333' };

        // Akordiyon Kontrolü
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            content.classList.toggle('open');
        }

        // Skor Sistemi
        function updateScores() {
            let scores = JSON.parse(localStorage.getItem('triyajScores') || '[]');
            if (score > 0) {
                scores.push({ s: score, d: difficultySettings[difficulty].tr });
                scores.sort((a, b) => b.s - a.s);
                scores = scores.slice(0, 3);
                localStorage.setItem('triyajScores', JSON.stringify(scores));
            }
            const hsList = document.getElementById('hsList');
            hsList.innerHTML = scores.map((s, i) => `${i+1}. ${s.d}: ${s.s} P`).join('<br>');
        }

        // Sesler
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSnd(f, t, d, v) {
            if ((!sfxEnabled && t !== 'triangle') || (!musicEnabled && t === 'triangle')) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }
        function btnSound() { playSnd(400, 'square', 0.05, 0.05); }

        // Müzik (Önceki Ritmik Yapı)
        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            const melody = [261, 329, 392, 523]; let s = 0;
            musicInterval = setInterval(() => { if (gameRunning && musicEnabled) { playSnd(melody[s % 4], 'triangle', 0.4, 0.03); s++; } }, 250);
        }

        // Çizimler
        function drawStretcher(x, y, w, h) {
            ctx.fillStyle = "#FFF"; ctx.fillRect(x + 20, y + 4, w - 20, 8); ctx.fillRect(x + 4, y, 16, 4);
            ctx.fillStyle = "#AAA"; ctx.fillRect(x + 20, y + 12, w - 20, 2);
            ctx.fillStyle = "#555"; ctx.fillRect(x + 24, y + 14, 6, 6); ctx.fillRect(x + w - 12, y + 14, 6, 6);
        }
        function drawPerson(x, y, color, isEx) {
            ctx.fillStyle = color; ctx.fillRect(x + 8, y, 12, 12); ctx.fillRect(x, y + 12, 28, 24);
            if(isEx) { ctx.fillStyle = "#FFF"; ctx.font = "bold 14px Arial"; ctx.fillText("X", x + 8, y + 30); }
        }

        function resize() {
            const w = document.getElementById('game-container').clientWidth;
            canvas.width = w; canvas.height = window.innerHeight * 0.5;
            paddle.y = canvas.height - 70; paddle.x = (w / 2) - 40;
        }
        window.addEventListener('resize', resize); resize();

        // Hareket
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') paddle.dx = -paddle.speed;
            if (e.key === 'ArrowRight' || e.key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);
        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); const t = e.touches[0]; const r = canvas.getBoundingClientRect();
            paddle.x = (t.clientX - r.left) * (canvas.width / r.width) - 40;
            paddle.x = Math.max(0, Math.min(canvas.width - 80, paddle.x));
        }, { passive: false });

        function update() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStretcher(paddle.x, paddle.y, paddle.width, paddle.height);
            paddle.x += paddle.dx; paddle.x = Math.max(0, Math.min(canvas.width - 80, paddle.x));

            patients.forEach((p, i) => {
                if (!p.isBlack && p.y > canvas.height * 0.4 && Math.random() < difficultySettings[difficulty].blackChance) {
                    p.isBlack = true; p.c = patientTypes.BLACK;
                }
                drawPerson(p.x, p.y, p.c, p.isBlack);
                p.y += p.s;
                if (p.y + 30 > paddle.y && p.x + 25 > paddle.x && p.x < paddle.x + 80) {
                    playSnd(p.isBlack ? 100 : 800, 'square', 0.1, 0.1);
                    score += p.isBlack ? -15 : (p.c === patientTypes.GREEN ? 5 : (p.c === patientTypes.YELLOW ? 10 : 20));
                    scoreEl.innerText = score; patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            animationId = requestAnimationFrame(update);
        }

        function spawn() {
            if (!gameRunning) return;
            const types = [
                {c: patientTypes.GREEN, s: 2.3}, {c: patientTypes.YELLOW, s: 3.8}, {c: patientTypes.RED, s: 5.8}
            ];
            const t = types[Math.floor(Math.random() * 3)];
            patients.push({ x: Math.random() * (canvas.width - 30), y: -50, c: t.c, s: t.s, isBlack: false });
            setTimeout(spawn, 1000);
        }

        function startGame() {
            if (gameRunning) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            gameRunning = true; score = 0; time = 0; patients = []; overlay.style.display = 'none';
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            startMusic(); spawn(); update();
        }

        function endGame() {
            if (!gameRunning) return; gameRunning = false; clearInterval(timerInterval); cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `PUAN: ${score}<br>SÜRE: ${time}sn`;
            overlay.style.display = 'flex'; updateScores();
        }

        function resetGame() { endGame(); setTimeout(startGame, 100); }
        function setDifficulty(l) {
            if (gameRunning) return; difficulty = l;
            document.querySelectorAll('.pixel-btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById('btn-' + l).classList.add('active-diff');
        }
        function toggleSFX() { sfxEnabled = !sfxEnabled; document.getElementById('sfxToggle').innerText = `SES: ${sfxEnabled ? 'AÇIK' : 'KAPALI'}`; }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('musicToggle').innerText = `MÜZİK: ${musicEnabled ? 'AÇIK' : 'KAPALI'}`; }
        
        function generateAndShare() {
            const tC = document.createElement('canvas'); const t = tC.getContext('2d'); tC.width = 500; tC.height = 400;
            t.fillStyle = '#000'; t.fillRect(0, 0, 500, 400);
            t.fillStyle = var(--sf-yellow); t.font = 'bold 30px Arial'; t.textAlign = 'center'; t.fillText('TRİYAJ SKORUM', 250, 100);
            t.fillStyle = '#FFF'; t.font = 'bold 80px Arial'; t.fillText(score, 250, 220);
            t.font = '20px Arial'; t.fillText(time + ' SANİYE', 250, 300);
            tC.toBlob(blob => {
                const f = new File([blob], 'rekor.png', {type: 'image/png'});
                if (navigator.share) navigator.share({title: 'Triyaj Arcade', text: `Skorum: ${score}`, files: [f]});
            });
        }
        
        updateScores(); // İlk açılışta skorları yükle
    </script>
</body>
</html>
