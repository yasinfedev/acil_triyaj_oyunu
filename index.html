<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade - Dr. Yasin Yıldız Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --sf-yellow: #ffcc00; --sf-orange: #ff4500; --bg-dark: #1a1a1a; }
        
        body {
    background-color: #1a1a1a;
    /* Kendi görselini yüklediğinde URL kısmını güncelleyebilirsin */
    background-image: 
        linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), /* Oyun alanını okunaklı tutmak için karartma katmanı */
        url('https://acil42.com/wp-content/uploads/2026/05/Gemini_Generated_Image_6l5nw56l5nw56l5n.png'); 
    background-size: cover; 
    background-position: center;
    background-attachment: fixed; /* Kaydırmada görsel sabit kalır, derinlik hissi artar */
}
        .game-title {
            font-size: 18px; font-style: italic; color: var(--sf-yellow);
            text-shadow: 3px 3px 0px var(--sf-orange), 5px 5px 0px #000;
            margin-bottom: 15px; transform: skew(-10deg); text-align: center;
        }

        /* Akordiyon Stilleri */
        .accordion-wrapper {
            width: 95vw; max-width: 500px; margin-bottom: 10px;
            border: 2px solid #444; background: #222;
        }

        .accordion-header {
            width: 100%; background: #333; color: var(--sf-yellow);
            padding: 10px; font-size: 9px; border: none; cursor: pointer;
            font-family: 'Press Start 2P', cursive; text-align: center;
        }

        .accordion-content {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            background: #111; color: #ccc; font-size: 8px; line-height: 1.6;
        }

        .accordion-content.open {
            max-height: 300px; padding: 15px; border-top: 1px solid #444;
        }

        #game-container {
            position: relative; border: 4px solid var(--sf-yellow); border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.9); width: 95vw; max-width: 500px;
            box-shadow: 0 0 20px var(--sf-orange);
        }

        canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }

        .ui-top {
            display: flex; justify-content: space-between; padding: 10px; font-size: 9px;
            background: #222; border-bottom: 2px solid var(--sf-yellow);
        }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive; font-size: 8px; border: 2px solid #000;
            box-shadow: 2px 2px 0px #555; padding: 8px 10px; text-transform: uppercase; transition: 0.1s;
            cursor: pointer; background: #eee; color: #000;
        }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        
        .btn-sf { background: linear-gradient(to bottom, var(--sf-yellow), var(--sf-orange)); color: white; text-shadow: 1px 1px #000; }
        
        .bottom-controls { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; width: 95vw; max-width: 500px; justify-content: center; }

        #game-over-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; padding: 20px;
        }

        .active-diff { border: 2px solid white !important; opacity: 1 !important; transform: scale(1.1); }
        .footer-credit { margin-top: 20px; font-size: 7px; color: #777; text-align: center; padding-bottom: 20px; }
        
        .hs-row { display: flex; justify-content: space-between; margin-bottom: 5px; color: #00e5ff; }
    </style>
</head>
<body>

    <h1 class="game-title">ACİL TRİYAJ<br>ARCADE</h1>

    <!-- NASIL OYNANIR AKORDİYON -->
    <div class="accordion-wrapper">
        <button class="accordion-header" onclick="toggleAccordion('howToPlay')">NASIL OYNANIR? ▼</button>
        <div id="howToPlay" class="accordion-content">
            • Sağa/Sola hareketle hastaları yakala!<br><br>
            • YEŞİL(+5), SARI(+10), KIRMIZI(+20)<br><br>
            • SİYAH (EX) yakalarsan -15 PUAN!
        </div>
    </div>

    <div class="d-flex gap-2 mb-2">
        <button id="sfxToggle" class="pixel-btn" onclick="btnClickSound(); toggleSFX()">EFEKT: AÇIK</button>
        <button id="musicToggle" class="pixel-btn" onclick="btnClickSound(); toggleMusic()">MÜZİK: AÇIK</button>
    </div>

    <div class="mb-3 d-flex gap-2">
        <button id="btn-easy" class="pixel-btn btn-success active-diff" onclick="btnClickSound(); setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="pixel-btn btn-warning" style="opacity:0.6" onclick="btnClickSound(); setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="pixel-btn btn-danger" style="opacity:0.6" onclick="btnClickSound(); setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div style="color: #00e5ff;">SÜRE:<span id="timer">0</span></div>
            <div style="color: var(--sf-yellow);">PUAN:<span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-overlay">
            <div class="game-title" style="font-size: 16px;">OYUN BİTTİ</div>
            <div id="final-result" class="mb-4" style="font-size: 10px; line-height: 2; text-align:center;"></div>
            <button class="pixel-btn w-75 mb-2" onclick="btnClickSound(); resetGame()">TEKRAR DENE</button>
            <button class="pixel-btn btn-sf w-75" onclick="btnClickSound(); generateAndShare()">PAYLAŞ 📱</button>
        </div>
    </div>

    <div class="bottom-controls">
        <button id="startBtn" class="pixel-btn" style="border-color: #00FF00" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="pixel-btn" style="border-color: #FF0000" onclick="btnClickSound(); endGame()">BİTİR</button>
        <button id="restartBtn" class="pixel-btn" style="border-color: #00e5ff" onclick="btnClickSound(); resetGame()">RESTART</button>
    </div>

    <!-- SKOR TABLOSU AKORDİYON -->
    <div class="accordion-wrapper" style="margin-top:15px;">
        <button class="accordion-header" onclick="toggleAccordion('highScores')">TOP 3 SKORLAR ▼</button>
        <div id="highScores" class="accordion-content">
            <div id="hsList">Henüz skor kaydedilmedi.</div>
        </div>
    </div>

    <div class="footer-credit">
        Geliştirici Uzm.Dr.Yasin Yıldız (c) 2026<br>Tüm hakları saklıdır.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');

        let score = 0, time = 0, gameRunning = false, sfxEnabled = true, musicEnabled = true;
        let patients = [], animationId, timerInterval, musicInterval;
        let difficulty = 'easy';
        let paddle = { width: 80, height: 16, x: 0, y: 0, speed: 16, dx: 0 };

        const difficultySettings = { easy: { blackChance: 0.002, tr: 'KOLAY' }, medium: { blackChance: 0.01, tr: 'ORTA' }, hard: { blackChance: 0.025, tr: 'ZOR' } };
        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.3, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.8, points: 10 },
            RED: { color: '#FF0000', speed: 5.8, points: 20 },
            BLACK: { color: '#333333', speed: 4.8, points: -15 }
        };

        // --- AKORDİYON ---
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            content.classList.toggle('open');
        }

        // --- SKOR KAYIT ---
        function saveHighScore() {
            let scores = JSON.parse(localStorage.getItem('triyaj_highscores') || '[]');
            if (score > 0) {
                scores.push({ score, diff: difficultySettings[difficulty].tr });
                scores.sort((a, b) => b.score - a.score);
                scores = scores.slice(0, 3);
                localStorage.setItem('triyaj_highscores', JSON.stringify(scores));
            }
            displayScores();
        }

        function displayScores() {
            const scores = JSON.parse(localStorage.getItem('triyaj_highscores') || '[]');
            const list = document.getElementById('hsList');
            if(scores.length === 0) return;
            list.innerHTML = scores.map((s, i) => `
                <div class="hs-row">
                    <span>${i+1}. ${s.diff}</span>
                    <span>${s.score} P</span>
                </div>
            `).join('');
        }

        // --- SES ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, duration, vol) {
            if (!sfxEnabled && (type === 'square' || type === 'sawtooth')) return;
            if (!musicEnabled && type === 'triangle') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function btnClickSound() { playNote(400, 'square', 0.05, 0.05); }
        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            const melody = [261, 329, 392, 523, 392, 329]; let step = 0;
            musicInterval = setInterval(() => {
                if (gameRunning && musicEnabled) {
                    playNote(melody[step % melody.length], 'triangle', 0.4, 0.03);
                    step++;
                }
            }, 250);
        }

        const SFX = {
            catch: () => playNote(600, 'square', 0.1, 0.1),
            hitBlack: () => { playNote(150, 'sawtooth', 0.3, 0.2); playNote(100, 'sawtooth', 0.3, 0.2); },
            start: () => { playNote(440, 'square', 0.2, 0.1); setTimeout(() => playNote(554, 'square', 0.2, 0.1), 100); },
            end: () => playNote(200, 'square', 0.5, 0.1)
        };

        function toggleSFX() { sfxEnabled = !sfxEnabled; document.getElementById('sfxToggle').innerText = `EFEKT: ${sfxEnabled ? 'AÇIK' : 'KAPALI'}`; }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('musicToggle').innerText = `MÜZİK: ${musicEnabled ? 'AÇIK' : 'KAPALI'}`; }

        // --- PİXEL ÇİZİMLER ---
        function drawPixelStretcher(x, y, w, h) {
            ctx.fillStyle = "#FFF"; ctx.fillRect(x + 20, y + 4, w - 20, 8); ctx.fillRect(x + 4, y, 16, 4);
            ctx.fillStyle = "#AAA"; ctx.fillRect(x + 20, y + 12, w - 20, 2);
            ctx.fillStyle = "#555"; ctx.fillRect(x + 24, y + 14, 6, 6); ctx.fillRect(x + w - 12, y + 14, 6, 6);
        }

        function drawPixelPerson(x, y, color, isEx) {
            ctx.fillStyle = color; ctx.fillRect(x + 8, y, 12, 12); ctx.fillRect(x, y + 12, 28, 24);
            if(isEx) { ctx.fillStyle = "#FFF"; ctx.font = "bold 14px Arial"; ctx.fillText("X", x + 8, y + 30); }
        }

        // --- OYUN ---
        function resizeCanvas() {
            const containerW = document.getElementById('game-container').clientWidth;
            canvas.width = containerW; canvas.height = window.innerHeight * 0.45;
            paddle.y = canvas.height - 70; paddle.x = (canvas.width / 2) - 40;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); const touch = e.touches[0]; const rect = canvas.getBoundingClientRect();
            paddle.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - 40;
            paddle.x = Math.max(0, Math.min(canvas.width - 80, paddle.x));
        }, { passive: false });

        function update() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPixelStretcher(paddle.x, paddle.y, paddle.width, paddle.height);
            paddle.x += paddle.dx; paddle.x = Math.max(0, Math.min(canvas.width - 80, paddle.x));

            patients.forEach((p, i) => {
                if (!p.isBlack && p.y > canvas.height * 0.4 && Math.random() < difficultySettings[difficulty].blackChance) {
                    p.isBlack = true; p.type = { ...patientTypes.BLACK };
                }
                drawPixelPerson(p.x, p.y, p.type.color, p.isBlack);
                p.y += p.type.speed;
                if (p.y + 30 > paddle.y && p.x + 25 > paddle.x && p.x < paddle.x + paddle.width) {
                    if (p.isBlack) SFX.hitBlack(); else SFX.catch();
                    score += p.type.points; scoreEl.innerText = score; patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            animationId = requestAnimationFrame(update);
        }

        function spawn() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            patients.push({ x: Math.random() * (canvas.width - 30), y: -50, type: { ...patientTypes[keys[Math.floor(Math.random() * 3)]] }, isBlack: false });
            setTimeout(spawn, 1000);
        }

        function startGame() {
            if (gameRunning) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            SFX.start(); startMusic(); gameRunning = true; score = 0; time = 0; patients = [];
            overlay.style.display = 'none'; timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            spawn(); update();
        }

        function endGame() {
            if (!gameRunning) return; SFX.end();
            gameRunning = false; clearInterval(timerInterval); cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `PUAN: ${score}<br>SÜRE: ${time}sn<br>MOD: ${difficultySettings[difficulty].tr}`;
            overlay.style.display = 'flex'; saveHighScore();
        }

        function resetGame() { endGame(); setTimeout(startGame, 100); }

        function setDifficulty(lvl) {
            if (gameRunning) return; difficulty = lvl;
            document.querySelectorAll('.pixel-btn').forEach(b => { if(b.id.startsWith('btn-')) { b.classList.remove('active-diff'); b.style.opacity = "0.6"; } });
            const active = document.getElementById('btn-' + lvl); active.classList.add('active-diff'); active.style.opacity = "1";
        }

        function generateAndShare() {
            const tC = document.createElement('canvas'); 
            const t = tC.getContext('2d'); 
            tC.width = 500; 
            tC.height = 550; 
            
            // Arka Plan
            t.fillStyle = '#1a1a1a'; 
            t.fillRect(0, 0, 500, 550);
            
            // --- STREET FIGHTER STİLİ LOGO (GÜNCELLENDİ) ---
            t.save(); 
            t.translate(250, 80); 
            t.rotate(-0.05); // Hafif eğik duruş
            
            // Gölge Katmanı (Turuncu-Kırmızı)
            t.font = 'bold 36px Arial Black'; 
            t.textAlign = 'center'; 
            t.fillStyle = '#ff4500'; 
            t.fillText('ACİL TRİYAJ ARCADE', 4, 4);
            
            // Ana Katman (Sarı)
            t.fillStyle = '#ffcc00'; 
            t.fillText('ACİL TRİYAJ ARCADE', 0, 0); 
            t.restore();
            // ----------------------------------------------

            // Skor Bilgileri
            t.fillStyle = '#ffcc00'; 
            t.font = 'bold 100px Arial'; 
            t.textAlign = 'center'; 
            t.fillText(score, 250, 250);
            
            t.fillStyle = '#ffffff'; 
            t.font = '22px Courier New'; 
            t.fillText('SKORUNUZ!', 250, 300);
            
            t.fillStyle = '#3498db'; 
            t.font = '20px Arial';
            t.fillText(`${time} SANİYE - ${difficultySettings[difficulty].tr}`, 250, 380);
            
            // İmza
            t.fillStyle = '#777';
            t.font = '12px Arial';
            t.fillText('Geliştirici Uzm.Dr.Yasin Yıldız (c) 2026', 250, 510);

            // Paylaşım Tetikleyici
            tC.toBlob(blob => {
                const f = new File([blob], 'triyaj_arcade_skor.png', {type: 'image/png'});
                if (navigator.share && navigator.canShare && navigator.canShare({files: [f]})) {
                    navigator.share({
                        title: 'Acil Triyaj Arcade Skorum',
                        text: `Bakalım bu skoru geçebilecek misin? Puanım: ${score}`,
                        files: [f]
                    });
                } else {
                    const a = document.createElement('a'); 
                    a.download = 'triyaj_skor.png'; 
                    a.href = tC.toDataURL(); 
                    a.click(); 
                }
            });
        }
        displayScores();
    </script>
</body>
</html>
