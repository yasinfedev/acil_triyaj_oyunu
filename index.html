<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acil Triyaj Arcade - Neon Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff00ff; 
            --neon-blue: #00ffff; 
            --neon-yellow: #f1c40f; 
            --sf-orange: #ff4500;
        }
        body {
            background-color: #0d0d0d;
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('https://img.freepik.com/free-vector/hospital-hallway-concept-illustration_114360-14169.jpg');
            background-size: cover; background-position: center;
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; font-family: 'Press Start 2P', cursive; overflow-x: hidden; touch-action: none;
        }
        .game-title {
            font-size: 18px; color: var(--neon-yellow);
            text-shadow: 2px 2px 0px var(--neon-pink), 4px 4px 0px #000;
            margin-bottom: 10px; transform: skew(-5deg); text-align: center;
        }
        #game-container {
            position: relative; border: 4px solid var(--neon-blue); border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.95); width: 95vw; max-width: 500px;
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 10px var(--neon-blue);
        }
        canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
        
        /* UI Panelleri */
        .info-panel, .score-panel {
            font-size: 8px; line-height: 1.6; padding: 10px;
            border: 2px solid var(--neon-pink); margin-top: 10px;
            background: rgba(0,0,0,0.8); width: 95vw; max-width: 500px;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        .score-item { display: flex; justify-content: space-between; margin-bottom: 5px; color: var(--neon-blue); }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive; font-size: 8px; border: 2px solid #fff;
            padding: 8px 10px; text-transform: uppercase; transition: 0.1s; cursor: pointer;
            background: transparent; color: #fff; margin: 2px;
        }
        .pixel-btn:hover { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .active-diff { background: var(--neon-pink) !important; box-shadow: 0 0 10px var(--neon-pink); }

        #game-over-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; padding: 20px;
        }
        .footer-credit { margin-top: 15px; font-size: 7px; color: #555; text-align: center; }
    </style>
</head>
<body>

    <h1 class="game-title">ACİL TRİYAJ ARCADE</h1>

    <!-- Bilgilendirme Paneli -->
    <div class="info-panel">
        <div style="color: var(--neon-pink); margin-bottom: 5px; text-align: center;">NASIL OYNANIR?</div>
        • Sağa/Sola hareketle hastaları sedyeye al!<br>
        • <span style="color: #00FF00;">YEŞİL(+5)</span>, <span style="color: #FFFF00;">SARI(+10)</span>, <span style="color: #FF0000;">KIRMIZI(+20)</span><br>
        • <span style="color: #333; background: #fff;">SİYAH (EX)</span> yakalarsan <span style="color: var(--neon-pink);">-15 PUAN!</span>
    </div>

    <div class="d-flex gap-2 my-2">
        <button id="sfxToggle" class="pixel-btn" onclick="btnClickSound(); toggleSFX()">SES: AÇIK</button>
        <button id="musicToggle" class="pixel-btn" onclick="btnClickSound(); toggleMusic()">MÜZİK: AÇIK</button>
    </div>

    <div class="mb-2 d-flex gap-2">
        <button id="btn-easy" class="pixel-btn active-diff" onclick="btnClickSound(); setDifficulty('easy')">KOLAY</button>
        <button id="btn-medium" class="pixel-btn" onclick="btnClickSound(); setDifficulty('medium')">ORTA</button>
        <button id="btn-hard" class="pixel-btn" onclick="btnClickSound(); setDifficulty('hard')">ZOR</button>
    </div>

    <div id="game-container">
        <div class="ui-top">
            <div style="color: var(--neon-blue);">SÜRE:<span id="timer">0</span></div>
            <div style="color: var(--neon-yellow);">PUAN:<span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="game-over-overlay">
            <div class="game-title" style="font-size: 16px;">EKSİTUS!</div>
            <div id="final-result" class="mb-4" style="font-size: 10px; line-height: 2;"></div>
            <button class="pixel-btn w-75 mb-2" style="border-color: var(--neon-blue)" onclick="btnClickSound(); resetGame()">TEKRAR DENE</button>
            <button class="pixel-btn w-75" style="border-color: var(--neon-pink)" onclick="btnClickSound(); generateAndShare()">PAYLAŞ 📱</button>
        </div>
    </div>

    <div class="bottom-controls my-2">
        <button id="startBtn" class="pixel-btn" style="color: #00FF00; border-color: #00FF00;" onclick="startGame()">BAŞLA</button>
        <button id="endBtn" class="pixel-btn" style="color: #FF0000; border-color: #FF0000;" onclick="btnClickSound(); endGame()">BİTİR</button>
        <button id="restartBtn" class="pixel-btn" style="color: var(--neon-blue); border-color: var(--neon-blue);" onclick="btnClickSound(); resetGame()">RESTART</button>
    </div>

    <!-- Puan Tablosu Paneli -->
    <div class="score-panel">
        <div style="color: var(--neon-blue); margin-bottom: 8px; text-align: center;">TOP 3 SKORLAR</div>
        <div id="highScoresList"></div>
    </div>

    <div class="footer-credit">
        Geliştirici Uzm.Dr.Yasin Yıldız (c) 2026<br>Tüm hakları saklıdır.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('game-over-overlay');
        const finalResultEl = document.getElementById('final-result');
        const hsListEl = document.getElementById('highScoresList');

        let score = 0, time = 0, gameRunning = false, sfxEnabled = true, musicEnabled = true;
        let patients = [], animationId, timerInterval, musicInterval;
        let difficulty = 'easy';
        let paddle = { width: 80, height: 16, x: 0, y: 0, speed: 16, dx: 0 };

        const difficultySettings = { easy: { blackChance: 0.002, tr: 'KOLAY' }, medium: { blackChance: 0.01, tr: 'ORTA' }, hard: { blackChance: 0.025, tr: 'ZOR' } };
        const patientTypes = {
            GREEN: { color: '#00FF00', speed: 2.3, points: 5 },
            YELLOW: { color: '#FFFF00', speed: 3.8, points: 10 },
            RED: { color: '#FF0000', speed: 5.8, points: 20 },
            BLACK: { color: '#333333', speed: 4.8, points: -15 }
        };

        // --- PUAN TABLOSU SİSTEMİ ---
        function updateHighScores() {
            let scores = JSON.parse(localStorage.getItem('triyajScores') || '[]');
            if (score > 0) {
                scores.push({ s: score, d: difficultySettings[difficulty].tr, t: new Date().toLocaleDateString() });
                scores.sort((a, b) => b.s - a.s);
                scores = scores.slice(0, 3);
                localStorage.setItem('triyajScores', JSON.stringify(scores));
            }
            displayHighScores();
        }

        function displayHighScores() {
            const scores = JSON.parse(localStorage.getItem('triyajScores') || '[]');
            hsListEl.innerHTML = scores.map((s, i) => 
                `<div class="score-item"><span>${i+1}. ${s.d}</span> <span>${s.s} Puan</span></div>`
            ).join('') || '<div style="text-align:center; opacity:0.5;">Henüz skor yok</div>';
        }
        displayHighScores();

        // --- SES SİSTEMİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, duration, vol) {
            if ((!sfxEnabled && type !== 'triangle') || (!musicEnabled && type === 'triangle')) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function btnClickSound() { playNote(400, 'square', 0.05, 0.05); }
        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            const melody = [261, 329, 392, 523, 392, 329]; let step = 0;
            musicInterval = setInterval(() => { if (gameRunning && musicEnabled) { playNote(melody[step % melody.length], 'triangle', 0.4, 0.03); step++; } }, 250);
        }

        // --- PİXEL ÇİZİMLER ---
        function drawPixelStretcher(x, y, w, h) {
            ctx.fillStyle = "#FFF"; ctx.fillRect(x + 20, y + 4, w - 20, 8); ctx.fillRect(x + 4, y, 16, 4);
            ctx.fillStyle = var(--neon-blue); ctx.fillRect(x + 20, y + 12, w - 20, 2);
            ctx.fillStyle = "#555"; ctx.fillRect(x + 24, y + 14, 6, 6); ctx.fillRect(x + w - 12, y + 14, 6, 6);
        }
        function drawPixelPerson(x, y, color, isEx) {
            ctx.fillStyle = color; ctx.fillRect(x + 8, y, 12, 12); ctx.fillRect(x, y + 12, 28, 24);
            if(isEx) { ctx.fillStyle = "#FFF"; ctx.font = "bold 16px Arial"; ctx.fillText("X", x + 6, y + 30); }
        }

        // --- OYUN DÖNGÜSÜ ---
        function resizeCanvas() {
            const containerW = document.getElementById('game-container').clientWidth;
            canvas.width = containerW; canvas.height = window.innerHeight * 0.45;
            paddle.y = canvas.height - 70; paddle.x = (canvas.width / 2) - (paddle.width / 2);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'arrowleft' || key === 'a') paddle.dx = -paddle.speed;
            if (key === 'arrowright' || key === 'd') paddle.dx = paddle.speed;
        });
        document.addEventListener('keyup', () => paddle.dx = 0);

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); const touch = e.touches[0]; const rect = canvas.getBoundingClientRect();
            paddle.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - (paddle.width / 2);
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));
        }, { passive: false });

        function update() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPixelStretcher(paddle.x, paddle.y, paddle.width, paddle.height);
            paddle.x += paddle.dx; paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

            patients.forEach((p, i) => {
                if (!p.isBlack && p.y > canvas.height * 0.4 && Math.random() < difficultySettings[difficulty].blackChance) {
                    p.isBlack = true; p.type = { ...patientTypes.BLACK };
                }
                drawPixelPerson(p.x, p.y, p.type.color, p.isBlack);
                p.y += p.type.speed;
                if (p.y + 30 > paddle.y && p.x + 25 > paddle.x && p.x < paddle.x + paddle.width) {
                    playNote(p.isBlack ? 100 : 800, 'square', 0.1, 0.1);
                    score += p.type.points; scoreEl.innerText = score; patients.splice(i, 1);
                }
                if (p.y > canvas.height) patients.splice(i, 1);
            });
            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            if (gameRunning) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            gameRunning = true; score = 0; time = 0; patients = []; overlay.style.display = 'none';
            timerInterval = setInterval(() => { time++; timerEl.innerText = time; }, 1000);
            startMusic(); spawn(); update();
        }

        function spawn() {
            if (!gameRunning) return;
            const keys = ['GREEN', 'YELLOW', 'RED'];
            patients.push({ x: Math.random() * (canvas.width - 30), y: -50, type: { ...patientTypes[keys[Math.floor(Math.random() * 3)]] }, isBlack: false });
            setTimeout(spawn, 1000);
        }

        function endGame() {
            if (!gameRunning) return; gameRunning = false; clearInterval(timerInterval); cancelAnimationFrame(animationId);
            finalResultEl.innerHTML = `PUAN: ${score}<br>SÜRE: ${time}sn<br>MOD: ${difficultySettings[difficulty].tr}`;
            overlay.style.display = 'flex'; updateHighScores();
        }

        function resetGame() { endGame(); setTimeout(startGame, 100); }
        function setDifficulty(lvl) {
            if (gameRunning) return; difficulty = lvl;
            document.querySelectorAll('.pixel-btn').forEach(b => b.classList.remove('active-diff'));
            document.getElementById('btn-' + lvl).classList.add('active-diff');
        }

        function toggleSFX() { sfxEnabled = !sfxEnabled; document.getElementById('sfxToggle').innerText = `SES: ${sfxEnabled ? 'AÇIK' : 'KAPALI'}`; }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('musicToggle').innerText = `MÜZİK: ${musicEnabled ? 'AÇIK' : 'KAPALI'}`; }

        function generateAndShare() {
            const tC = document.createElement('canvas'); const t = tC.getContext('2d'); tC.width = 500; tC.height = 550;
            t.fillStyle = '#0d0d0d'; t.fillRect(0, 0, 500, 550);
            t.fillStyle = '#ff00ff'; t.font = 'bold 40px Arial'; t.textAlign = 'center'; t.fillText('ACİL TRİYAJ ARCADE', 250, 80);
            t.fillStyle = '#00ffff'; t.font = 'bold 100px Arial'; t.fillText(score, 250, 300);
            t.fillStyle = '#ffffff'; t.font = '22px Arial'; t.fillText('REKOR SKOR!', 250, 340);
            t.fillStyle = '#f1c40f'; t.fillText(`${time} SANİYE - ${difficultySettings[difficulty].tr}`, 250, 420);
            tC.toBlob(blob => {
                const f = new File([blob], 'rekor.png', {type: 'image/png'});
                if (navigator.share) navigator.share({title: 'Triyaj Arcade', text: `Skorum: ${score}`, files: [f]});
                else { const a = document.createElement('a'); a.download = 'rekor.png'; a.href = tC.toDataURL(); a.click(); }
            });
        }
    </script>
</body>
</html>
